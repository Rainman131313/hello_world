    <style>
        @keyframes flicker {
            0%, 100% { opacity: 1; text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 40px #0ff, 0 0 80px #00bfff; }
            5% { opacity: 0.85; text-shadow: 0 0 5px #0ff, 0 0 10px #0ff, 0 0 20px #0ff; }
            10% { opacity: 1; text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 40px #0ff, 0 0 80px #00bfff; }
            15% { opacity: 0.4; text-shadow: none; }
            16% { opacity: 1; text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 40px #0ff, 0 0 80px #00bfff; }
            50% { opacity: 1; text-shadow: 0 0 10px #0ff, 0 0 30px #0ff, 0 0 60px #0ff, 0 0 100px #00bfff; }
            52% { opacity: 0.7; text-shadow: 0 0 5px #0ff, 0 0 10px #0ff; }
            53% { opacity: 1; text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 40px #0ff, 0 0 80px #00bfff; }
            80% { opacity: 1; text-shadow: 0 0 15px #0ff, 0 0 30px #0ff, 0 0 60px #0ff, 0 0 100px #00bfff; }
            83% { opacity: 0.5; text-shadow: 0 0 5px #0ff; }
            84% { opacity: 1; text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 40px #0ff, 0 0 80px #00bfff; }
        }

        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 1px); }
            40% { transform: translate(2px, -1px); }
            60% { transform: translate(-1px, -1px); }
            80% { transform: translate(1px, 2px); }
        }

        @keyframes scanline {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        .title-cyber {
            font-family: 'Orbitron', sans-serif;
            color: #0ff;
            animation: flicker 4s infinite, glitch 8s infinite;
            letter-spacing: 0.15em;
            position: relative;
        }

        .title-cyber::before,
        .title-cyber::after {
            content: 'AI_SSISTANT';
            position: absolute;
            left: 0;
            right: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .title-cyber::before {
            top: -2px;
            color: #f0f;
            opacity: 0.15;
            animation: glitch 3s infinite reverse;
            clip-path: inset(0 0 60% 0);
        }

        .title-cyber::after {
            top: 2px;
            color: #0f0;
            opacity: 0.15;
            animation: glitch 2.5s infinite;
            clip-path: inset(60% 0 0 0);
        }

        .scanline-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 10;
        }

        .scanline-overlay::after {
            content: '';
            position: absolute;
            left: 0;
            width: 100%;
            height: 8px;
            background: rgba(0, 255, 255, 0.04);
            animation: scanline 6s linear infinite;
        }

        .subtitle {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            letter-spacing: 0.4em;
        }
    </style>
